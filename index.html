<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>RacingClub.io</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600&family=Jua&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 게임 메인 캔버스 (월드 렌더링) -->
  <canvas id="game"></canvas>

  <!-- 좌측 상단 나가기 버튼 (플레이 중에만 표시) -->
  <button id="exitBtn">나가기</button>

  <!-- 좌측 하단 속도계 : 정수 km/h 숫자만 -->
  <div id="speed">0</div>


  <!-- 가운데 하단 음소거 토스트 (m 키) : #time 과 동일 스타일, 잠깐 떴다 사라짐 -->
  <div id="muteToast"></div>

  <!-- 메인(메뉴) 화면 우측 하단 텍스트 링크 : #time 과 동일 스타일. href 는 직접 채워 넣기 -->
  <a id="mainLink" href="https://discord.gg/G8n88REdCe" target="_blank" rel="noopener">디스코드 입장</a>

  <!-- 로비 오버레이 : 접속 직후 대기 화면 (움직이면 걷힘, 정지하면 버튼만 복귀) -->
  <div id="lobbyUI">
    <span id="lobBrand" class="lob-el">RacingClub.io</span>
    <span id="lobOnline" class="lob-el">온라인 0</span>
    <div id="lobHint" class="lob-el"><span>움직여서 시작</span></div>
    <div id="lobBtns" class="lob-el">
      <button id="lobAccount" class="lob-btn" aria-label="계정">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="7" r="4"/><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/></svg>
      </button>
      <button id="lobDash" class="lob-btn" aria-label="대시보드">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 20v-8"/><path d="M12 20V5"/><path d="M19 20v-11"/></svg>
      </button>
      <button id="lobLogout" class="lob-btn" aria-label="로그아웃">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      </button>
      <a id="lobDiscord" class="lob-btn" href="https://discord.gg/G8n88REdCe" target="_blank" rel="noopener" aria-label="디스코드">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 5.2a13 13 0 0 1 6 0"/><path d="M6.3 5.6C4.6 6.2 3.4 7.2 3 8.4c-.9 2.9-1.1 5.8-.6 8.6 1.4 1.1 2.9 1.8 4.5 2.2l.9-1.8"/><path d="M17.7 5.6c1.7.6 2.9 1.6 3.3 2.8.9 2.9 1.1 5.8.6 8.6-1.4 1.1-2.9 1.8-4.5 2.2l-.9-1.8"/><path d="M8.6 17.7c2.2.5 4.6.5 6.8 0"/><circle cx="9.3" cy="12" r="0.8" fill="currentColor"/><circle cx="14.7" cy="12" r="0.8" fill="currentColor"/></svg>
      </a>
      <button id="lobSettings" class="lob-btn" aria-label="설정">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>
  
  <!-- 우측 상단 미니맵 -->
  <canvas id="minimap" width="180" height="180"></canvas>

  <!-- 미니맵 하단 채팅창 (모든 모드 공유) -->
  <div id="chat">
    <div id="chatLog"></div>
    <div id="chatRow">
      <input id="chatInput" type="text" maxlength="200" placeholder="채팅을 입력하세요." autocomplete="off" />
      <button id="chatSend">전송</button>
    </div>
  </div>

  <!-- 채팅 아래 플레이어 리스트/순위 (프로 레이싱) -->
  <div id="standings">
    <div class="stand-title">순위</div>
    <div id="standingsList"></div>
  </div>

  <!-- 채팅 아래 TOP10 기록 (자유 모드 타임어택) -->
  <div id="topRecords">
    <div class="stand-title">TOP 10</div>
    <div id="topRecordsList"></div>
  </div>

  <!-- 기록 HUD (하단 가운데) : 시간 + 기록 시작(대기=타이머 / 기록 중=다시) + (기록 중) 취소 + 다른 차 표시 -->
  <div id="recordHud">
    <span id="time"></span>
    <button id="attackBtn" aria-label="기록 시작">
      <svg class="ic-timer" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="10" y1="2" x2="14" y2="2"/><line x1="12" y1="14" x2="12" y2="9"/><circle cx="12" cy="14" r="8"/></svg>
      <svg class="ic-restart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    </button>
    <button id="attackCancel" aria-label="기록 취소">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
    </button>
    <button id="othersToggle">다른 차 표시</button>
  </div>

  <!-- 프로 레이싱 상단 종료 카운트다운 -->
  <div id="proTimer"></div>

  <!-- 사망 화면 (받혀서 죽은 플레이어에게 표시) -->
  <div id="death">
    <div class="death-title">사망...</div>
    <div class="death-sub">모드 선택으로…</div>
  </div>

  <!-- 시작/모드 선택 화면 (새로고침·사망·나가기 시 표시) -->
  <div id="menu">
    <div class="menu-card">
      <h1>RacingClub.io</h1>
      <label id="nameLabel" for="nameInput">닉네임</label>
      <input id="nameInput" type="text" maxlength="12" placeholder="이름을 입력하세요"
             autocomplete="off" />
      <div class="mode-buttons">
        <button id="btnRacing" class="mode-btn racing">
          <span class="mode-name">자유 레이싱</span>
          <span class="mode-count" id="countRacing">0명</span>
        </button>
        <button id="btnHard" class="mode-btn hard">
          <span class="mode-name">하드코어 레이싱</span>
          <span class="mode-count" id="countHard">0명</span>
        </button>
        <button id="btnSerp" class="mode-btn serp">
          <span class="mode-name">구불구불 레이싱</span>
          <span class="mode-count" id="countSerp">0명</span>
        </button>
        <button id="btnPro" class="mode-btn pro">
          <span class="mode-name">프로 레이싱</span>
          <span class="mode-count" id="countPro">0명</span>
        </button>
      </div>

      <!-- 로그인 / 회원가입 (버튼 → 팝업) -->
      <div id="authBox">
        <button id="authOpenBtn" class="auth-btn">로그인 / 회원가입</button>
        <div id="loggedIn" class="auth-form" style="display:none">
          <span id="welcomeMsg"></span>
          <button id="logoutBtn" class="auth-btn">로그아웃</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 로그인 / 회원가입 팝업 -->
  <div id="authModal">
    <div class="auth-card">
      <div id="loginForm" class="auth-form">
        <h2>로그인</h2>
        <input id="loginId" type="text" maxlength="20" placeholder="아이디" autocomplete="off" />
        <input id="loginPw" type="password" maxlength="4" inputmode="numeric" placeholder="비밀번호 (숫자 4자리)" autocomplete="off" />
        <button id="loginBtn" class="auth-btn">로그인</button>
        <div class="auth-switch">계정이 없나요? <span id="toSignup" class="auth-link">회원가입</span></div>
      </div>
      <div id="signupForm" class="auth-form" style="display:none">
        <h2>회원가입</h2>
        <input id="signupId" type="text" maxlength="20" placeholder="아이디 (영문/숫자 3~20자)" autocomplete="off" />
        <input id="signupNick" type="text" maxlength="12" placeholder="닉네임" autocomplete="off" />
        <input id="signupPw" type="password" maxlength="4" inputmode="numeric" placeholder="비밀번호 (숫자 4자리)" autocomplete="off" />
        <button id="signupBtn" class="auth-btn">회원가입</button>
        <div class="auth-switch">이미 계정이 있나요? <span id="toLogin" class="auth-link">로그인</span></div>
      </div>
      <button id="authClose" class="auth-btn auth-close">닫기</button>
    </div>
  </div>

  <!-- 게이트 그룹 팝업 : 카드(16:9)로 맵 선택 -->
  <div id="mapModal">
    <div class="map-panel">
      <h2 id="mapModalTitle"></h2>
      <p id="mapModalDesc"></p>
      <div id="mapGrid"></div>
      <button id="mapModalClose" class="auth-btn auth-close">닫기</button>
    </div>
  </div>

  <!-- 좌측 하단 대시보드 버튼 (로그인 시) -->
  <button id="dashBtn">대시보드</button>

  <!-- 계정 정보 팝업 (로그인 시 계정 아이콘) -->
  <div id="accountModal">
    <div class="dash-card">
      <h2>계정</h2>
      <div class="dash-row"><span>아이디</span><span id="accId">-</span></div>
      <div class="dash-row"><span>닉네임</span><span id="accName">-</span></div>
      <button id="accClose" class="auth-btn auth-close">닫기</button>
    </div>
  </div>

  <!-- 설정 팝업 (사운드 볼륨 + 미니맵/채팅 모서리 배치) -->
  <div id="settingsModal">
    <div class="dash-card">
      <h2>설정</h2>
      <div class="set-row">
        <span class="set-label">사운드</span>
        <input id="setVolume" type="range" min="0" max="100" step="1" value="100" />
        <span id="setVolumeVal">100</span>
      </div>
      <div class="set-row">
        <span class="set-label">시야각</span>
        <input id="setFov" type="range" min="40" max="100" step="5" value="50" />
        <span id="setFovVal">50</span>
      </div>
      <div class="set-row">
        <span class="set-label">미니맵 위치</span>
        <div class="set-seg" id="setMmPos">
          <button data-pos="tl">좌상</button><button data-pos="tr">우상</button><button data-pos="bl">좌하</button><button data-pos="br">우하</button>
        </div>
      </div>
      <div class="set-row">
        <span class="set-label">채팅 위치</span>
        <div class="set-seg" id="setChatPos">
          <button data-pos="tl">좌상</button><button data-pos="tr">우상</button><button data-pos="bl">좌하</button><button data-pos="br">우하</button>
        </div>
      </div>
      <button id="setClose" class="auth-btn auth-close">닫기</button>
    </div>
  </div>

  <!-- 대시보드 패널 -->
  <div id="dashboard">
    <div class="dash-card">
      <h2>대시보드</h2>
      <div class="dash-row"><span>접속 시간</span><span id="dashTime">-</span></div>
      <div class="dash-row"><span>자유 최고 기록</span><span id="dashBest">-</span></div>
      <div class="dash-row"><span>하드 최고 기록</span><span id="dashBestHard">-</span></div>
      <div class="dash-row"><span>구불구불 최고 기록</span><span id="dashBestSerp">-</span></div>
      <div class="dash-row"><span>프로 우승</span><span id="dashWins">0</span></div>
      <div class="dash-row"><span>프로 플레이</span><span id="dashPlays">0</span></div>
      <button id="dashClose" class="auth-btn auth-close">닫기</button>
    </div>
  </div>

  <!-- 프로 레이싱 방 목록(브라우저) -->
  <div id="roomBrowser">
    <div class="browser-card">
      <div class="browser-head">
        <h2>커스텀 방</h2>
        <button id="createRoomBtn">+ 방 만들기</button>
      </div>
      <div id="roomList"></div>
    </div>
  </div>

  <!-- 방 만들기 다이얼로그 -->
  <div id="createRoom">
    <div class="cr-card">
      <h2>방 만들기</h2>
      <label>방 이름</label>
      <input id="crName" type="text" maxlength="16" placeholder="방 이름 (비우면 자동)" autocomplete="off" />
      <div class="cr-row">
        <div class="cr-field">
          <label>바퀴 수</label>
          <input id="crLaps" type="number" min="1" max="20" value="3" />
        </div>
        <div class="cr-field">
          <label>최대 인원 (2~7명)</label>
          <input id="crMax" type="number" min="2" max="7" value="7" />
        </div>
      </div>
      <label>코스</label>
      <select id="crCourse">
        <option value="0">코스 1</option>
        <option value="1">코스 2</option>
        <option value="2">코스 3</option>
        <option value="3">코스 4</option>
        <option value="random">랜덤</option>
      </select>
      <label>시간 제한</label>
      <select id="crTime">
        <option value="60000">1분</option>
        <option value="120000">2분</option>
        <option value="180000">3분</option>
        <option value="300000">5분</option>
        <option value="0" selected>제한 없음</option>
      </select>
      <div class="cr-buttons">
        <button id="crCreate">만들기</button>
        <button id="crCancel">취소</button>
      </div>
    </div>
  </div>

  <!-- 프로 레이싱 로비(방) -->
  <div id="lobby">
    <div class="lobby-card">
      <h2 id="lobbyTitle">커스텀 대기실</h2>
      <p id="lobbyInfo" class="lobby-info"></p>
      <div id="lobbyList"></div>
      <p id="lobbyHint" class="lobby-hint"></p>
      <div class="lobby-buttons">
        <button id="readyBtn">준비</button>
        <button id="lobbyLeave">나가기</button>
        <button id="shareRoomBtn" aria-label="초대 링크 복사">
          <svg class="icon-link" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.7 1.7"/><path d="M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7l1.7-1.7"/></svg>
          <svg class="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- 모바일 터치 조작 (터치 기기에서만 표시) -->
  <div id="touchControls">
    <div id="touchSteer">
      <button class="touch-btn" data-key="a">◀</button>
      <button class="touch-btn" data-key="d">▶</button>
    </div>
    <div id="touchDrive">
      <button class="touch-btn" data-key="space">브레이크</button>
      <button class="touch-btn" data-key="s">후진</button>
      <button class="touch-btn gas" data-key="w">전진</button>
    </div>
  </div>

  <!-- 맵 전환 슬라이드 와이프 (JS 가 표시/애니메이션 제어) : 꽉 찬 동안 맵 제목/설명 표시 -->
  <div id="wipe">
    <div id="wipeTitle"></div>
    <div id="wipeDesc"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
