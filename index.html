<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top-View Supercar Physics</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 게임 메인 캔버스 (월드 렌더링) -->
  <canvas id="game"></canvas>

  <!-- 좌측 상단 나가기 버튼 (플레이 중에만 표시) -->
  <button id="exitBtn">← 나가기</button>

  <!-- 좌측 하단 속도계 : 정수 km/h 숫자만 -->
  <div id="speed">0</div>

  <!-- 우측 상단 미니맵 -->
  <canvas id="minimap" width="180" height="180"></canvas>

  <!-- 미니맵 하단 채팅창 (모든 모드 공유) -->
  <div id="chat">
    <div id="chatLog"></div>
    <div id="chatRow">
      <input id="chatInput" type="text" maxlength="200" placeholder="메시지 입력…" autocomplete="off" />
      <button id="chatSend">전송</button>
    </div>
  </div>

  <!-- 채팅 아래 플레이어 리스트/순위 (프로 레이싱) -->
  <div id="standings">
    <div class="stand-title">순위</div>
    <div id="standingsList"></div>
  </div>

  <!-- 사망 화면 (받혀서 죽은 플레이어에게 표시) -->
  <div id="death">
    <div class="death-title">사망...</div>
    <div class="death-sub">모드 선택으로…</div>
  </div>

  <!-- 시작/모드 선택 화면 (새로고침·사망·나가기 시 표시) -->
  <div id="menu">
    <div class="menu-card">
      <h1>MadeInChinaCarGame</h1>
      <label for="nameInput">닉네임</label>
      <input id="nameInput" type="text" maxlength="12" placeholder="이름을 입력하세요"
             autocomplete="off" />
      <div class="mode-buttons">
        <button id="btnSurvival" class="mode-btn survival">
          <span class="mode-name">서바이벌</span>
          <span class="mode-count" id="countSurvival">0명</span>
        </button>
        <button id="btnRacing" class="mode-btn racing">
          <span class="mode-name">자유 레이싱</span>
          <span class="mode-count" id="countRacing">0명</span>
        </button>
        <button id="btnPro" class="mode-btn pro">
          <span class="mode-name">프로 레이싱</span>
          <span class="mode-count" id="countPro">0명</span>
        </button>
      </div>
    </div>
  </div>

  <!-- 프로 레이싱 방 목록(브라우저) -->
  <div id="roomBrowser">
    <div class="browser-card">
      <div class="browser-head">
        <h2>🏁 프로 레이싱 방 목록</h2>
        <button id="createRoomBtn">+ 방 만들기</button>
      </div>
      <div id="roomList"></div>
      <button id="browserLeave" class="browser-leave">← 나가기</button>
    </div>
  </div>

  <!-- 방 만들기 다이얼로그 -->
  <div id="createRoom">
    <div class="cr-card">
      <h2>방 만들기</h2>
      <label>방 이름</label>
      <input id="crName" type="text" maxlength="16" placeholder="방 이름 (비우면 자동)" autocomplete="off" />
      <div class="cr-row">
        <div class="cr-field">
          <label>바퀴 수</label>
          <input id="crLaps" type="number" min="1" max="20" value="3" />
        </div>
        <div class="cr-field">
          <label>최대 인원 (1=솔로)</label>
          <input id="crMax" type="number" min="1" max="7" value="7" />
        </div>
      </div>
      <label>코스</label>
      <select id="crCourse">
        <option value="0">코스 1</option>
        <option value="1">코스 2</option>
        <option value="2">코스 3</option>
        <option value="3">코스 4</option>
        <option value="random">랜덤</option>
      </select>
      <label>시간 제한</label>
      <select id="crTime">
        <option value="60000">1분</option>
        <option value="120000">2분</option>
        <option value="180000">3분</option>
        <option value="300000">5분</option>
        <option value="0" selected>제한 없음</option>
      </select>
      <div class="cr-buttons">
        <button id="crCreate">만들기</button>
        <button id="crCancel">취소</button>
      </div>
    </div>
  </div>

  <!-- 프로 레이싱 로비(방) -->
  <div id="lobby">
    <div class="lobby-card">
      <h2 id="lobbyTitle">🏁 프로 레이싱 로비</h2>
      <p id="lobbyInfo" class="lobby-info"></p>
      <div id="lobbyList"></div>
      <p id="lobbyHint" class="lobby-hint"></p>
      <div class="lobby-buttons">
        <button id="readyBtn">준비</button>
        <button id="lobbyLeave">나가기</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
