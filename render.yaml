# Render 배포 설정 (Infrastructure as Code)
# - Render 대시보드에서 "New +" → "Blueprint" 로 이 repo 를 연결하면
#   이 파일을 읽어 자동으로 서비스를 생성한다.
services:
  - type: web
    name: car-game
    runtime: node
    region: singapore     # 한국에서 가장 가까운 Render 리전 (US West 대비 지연 大↓)
    plan: free            # 무료 플랜 (15분 미접속 시 잠듦 → 콜드스타트)
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true      # main 브랜치 푸시 시 자동 재배포
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      # Upstash Redis (계정/통계 영속) — 값은 Render 대시보드에서 설정(시크릿)
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
